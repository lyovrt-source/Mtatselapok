<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LyovT Math Cards - Logic Restored</title>
<style>
:root { --gold: #ffd700; --bg: #0a192f; --red: #ff4444; --green: #1a7a4a; --neon-green: #39ff14; --gray: #444; --card-bg: #000; --blue: #2196F3; }
body { background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }

.mini-stake-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(10, 25, 47, 0.98); border-radius: 12px; z-index: 50;
  display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 6px;
  border: 2px solid var(--gold); box-sizing: border-box; padding: 5px;
}
.mini-opt {
  width: 85%; background: #222; color: #fff; border: 1px solid var(--blue);
  padding: 8px 0; border-radius: 4px; font-size: 13px; font-weight: bold; cursor: pointer;
}
.mini-opt:disabled { opacity: 0.2; border-color: #444; color: #666; }

@keyframes flash-green {
  0% { background: rgba(57, 255, 20, 0); }
  50% { background: rgba(57, 255, 20, 0.4); box-shadow: 0 0 20px var(--neon-green); }
  100% { background: rgba(0, 0, 0, 0.4); }
}
.push-effect { animation: flash-green 0.4s ease-out !important; }

@keyframes winner-bounce {
  0%, 100% { transform: scale(1); color: var(--gold); }
  50% { transform: scale(1.1); color: var(--neon-green); text-shadow: 0 0 8px var(--neon-green); }
}
.winner-active-name { display: inline-block; animation: winner-bounce 0.8s infinite ease-in-out; font-weight: bold; cursor: pointer; }
.victory-label { color: var(--neon-green) !important; font-weight: 900 !important; text-transform: uppercase; font-size: 11px; }

.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000;
}
.modal-content {
  background: #1a1a1a; padding: 20px; border-radius: 15px; border: 2px solid var(--gold);
  width: 300px; max-height: 85vh; overflow-y: auto; box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
}
.modal-input {
  width: 80%; padding: 10px; margin: 15px 0; border-radius: 8px; border: 1px solid var(--gray);
  background: #000; color: #fff; text-align: center; font-size: 18px; outline: none;
}
.modal-btn {
  background: var(--green); color: white; border: none; padding: 10px 20px;
  border-radius: 6px; cursor: pointer; font-weight: bold; width: auto; min-width: 100px;
}
.icon-btn { background: #333; border: 1px solid #555; font-size: 20px; padding: 5px; border-radius: 8px; cursor: pointer; vertical-align: middle; }

.table-container { display: flex; justify-content: center; align-items: center; height: 85vh; padding-top: 5px; }
.table {
  position: relative; width: 92vw; max-width: 380px; height: 75vh;     
  background: radial-gradient(circle at center, #1e3c72 0%, #0a192f 100%);
  border-radius: 160px; border: 10px solid #050a14; box-shadow: inset 0 0 45px #000;
}
.table-texture-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
  opacity: 0.15; pointer-events: none; border-radius: 150px; z-index: 0;
}

#dealerCards { position: absolute; top: 44%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 4px; z-index: 1; }
.table-label {
  position: absolute; top: 56%; left: 50%; transform: translate(-50%, -50%);
  color: rgba(255, 215, 0, 0.4); font-size: 19px; font-weight: bold; letter-spacing: 1px;
  text-transform: uppercase; pointer-events: none; font-style: italic;
}

.card { width: 36px; height: 52px; position: relative; transform-style: preserve-3d; transition: transform 0.4s; }
#dealerCards .card { width: 44px; height: 64px; }
.face { 
  background: var(--card-bg); transform: rotateY(180deg); font-size: 40px; font-weight: 900; color: #fff; 
  display: flex; align-items: center; justify-content: center; border: 1.5px solid var(--gray); border-radius: 50%;
  position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
}
.seat-slot .face { font-size: 34px; }
.back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; background: linear-gradient(45deg, #333, #000); border: 1px solid var(--gray); border-radius: 50%; }
.card.open { transform: rotateY(180deg); }

.seat-slot {
  position: absolute; transform: translate(-50%, -50%);
  width: 90px; height: 120px; display: flex; flex-direction: column; align-items: center;
  z-index: 5; border: 1px solid transparent; transition: border 0.3s;
  box-sizing: border-box; -webkit-tap-highlight-color: transparent;
}
.seat-slot.active { border: 1px solid #444; border-radius: 12px; background: rgba(0, 0, 0, 0.4); padding: 4px; }
.seat-slot.folded { opacity: 0.5; filter: grayscale(0.8); }
.winner-glow { border: 2px solid var(--gold) !important; box-shadow: 0 0 25px var(--gold); background: rgba(255, 215, 0, 0.1) !important; }
.active-turn { border: 2px solid var(--neon-green) !important; box-shadow: 0 0 20px var(--neon-green); animation: pulse-neon 1.5s infinite; }

.name-box { width: 100%; background: rgba(0,0,0,0.92); padding: 1px 0; border-radius: 4px; border-bottom: 1px solid var(--gray); margin-bottom: 4px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
.name-tag { color: var(--gold); font-size: 10px; font-weight: bold; }
.score-tag { color: #fff; font-size: 12px; font-weight: 900; }
.fold-tag { color: var(--red); font-size: 14px; font-weight: bold; margin-top: 5px; }
.cards-container { display: flex; justify-content: center; gap: 3px; width: 100%; }

.fold-actions { display: flex; gap: 4px; margin-top: 8px; }
.btn-fold { background: var(--red); color: #fff; border: none; padding: 4px 6px; border-radius: 4px; font-size: 9px; cursor: pointer; font-weight: bold; min-width: 38px; height: 21px; }
.btn-plus { background: #333; color: #fff; border: 1px solid #666; padding: 4px 6px; border-radius: 4px; font-size: 10px; cursor: pointer; font-weight: bold; min-width: 38px; height: 21px; display: flex; align-items: center; justify-content: center; }
.btn-plus.pushed { background: var(--green); border-color: var(--neon-green); }

.balance-tag { 
  color: var(--gold); font-size: 11px; font-weight: bold; margin-top: 4px;
  border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 4px; padding: 1px 6px;
  background: rgba(0,0,0,0.3);
}

.controls { position: fixed; bottom: 10px; width: 100%; display: flex; flex-direction: column; align-items: flex-start; gap: 6px; padding: 0 10px; box-sizing: border-box; }
.btn-group { width: 100%; display: flex; justify-content: center; gap: 6px; }
.btn { flex: 1; padding: 14px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; background: #2e7d32; font-size: 11px; }
.bet-display { background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 5px; color: var(--gold); font-weight: bold; font-size: 14px; z-index: 100; margin-bottom: 2px; }

.score-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 5px; }
.group-dot { width: 16px; height: 16px; border-radius: 50%; border: 1px solid #666; cursor: pointer; margin-right: 10px; flex-shrink: 0; }
.total-score { font-size: 24px; color: var(--neon-green); margin-top: 15px; font-weight: 900; border-top: 2px solid var(--gold); padding-top: 10px; }
.group-selector { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 15px 0; justify-items: center; }
.g-btn { width: 35px; height: 35px; border-radius: 50%; border: 2px solid white; cursor: pointer; }

.group-block { display: flex; align-items: center; border-bottom: 1px solid #333; margin-bottom: 4px; }
.group-players { flex: 1; }
.group-total-val { font-size: 28px; font-weight: 900; color: #fff; padding: 0 15px; min-width: 50px; text-align: center; border-left: 1px solid rgba(255,255,255,0.1); }
</style>
</head>
<body onclick="closeAllMiniOverlays()">

<div id="customModal" class="modal-overlay">
  <div class="modal-content" id="modalContent">
    <h3 id="modalTitle" style="color:var(--gold); margin:0;"></h3>
    <div id="modalBody"></div>
    <div style="text-align: center; margin-top: 10px; display: flex; justify-content: space-around; align-items: center;">
      <button id="balToggleBtn" class="icon-btn" onclick="toggleBalanceUI()" style="display:none">🔘</button>
      <button class="modal-btn" onclick="closeModal()">ՀԱՍՏԱՏԵԼ</button>
      <button id="taxToggleBtn" class="icon-btn" onclick="setTaxRate()" style="display:none">💯</button>
    </div>
  </div>
</div>

<div class="table-container">
  <div class="table" id="mainTable" onclick="event.stopPropagation()">
    <div class="table-texture-overlay"></div>
    <div id="dealerCards"></div>
    <div class="table-label">Logic & math challenge</div>
  </div>
</div>

<div class="controls">
  <div class="bet-display" id="betDisplay">Ընթացիկ ՝ 0</div>
  <div class="btn-group">
    <button class="btn" style="background: #333; max-width: 45px;" onclick="undoMove()">↩️</button>
    <button class="btn" style="background: #555; max-width: 45px;" onclick="setBet()">📝</button>
    <button class="btn" style="background: #555; max-width: 45px;" onclick="showPoints()">📌</button>
    <button class="btn" onclick="startNewRound()">ՆՈՐ ԽԱՂ</button>
    <button class="btn" id="revealBtn" style="background: #2196F3;" onclick="revealAll()">ԲԱՑԵԼ</button>
    <button class="btn" id="nextBtn" style="background: #ef6c00;" onclick="nextCommunity()">ՀԱՋՈՐԴ</button>
  </div>
</div>

<script>
const values = ["1","2","3","4","5","6","7","8","9"];
const groupColors = ["transparent", "#ff00ff", "#00ffff", "#ffff00", "#39ff14", "#ff4500", "#8a2be2", "#ff0000", "#ffffff", "#000000"];
let deck = [], seats = [], community = [], stage = 0, isRevealed = false, gameFinished = false;
let gameCount = 0, baseBet = 30, currentRoundMax = 0, showBalanceUI = true, taxRate = 10;
let gameStateHistory = [], activeModalAction = null;

function saveState() {
  const state = {
    community: JSON.stringify(community), stage, currentRoundMax, showBalanceUI, taxRate, gameFinished,
    isRevealed, seats: JSON.stringify(seats.map(s => ({...s, lastClick: 0})))
  };
  gameStateHistory.push(state);
  if (gameStateHistory.length > 20) gameStateHistory.shift();
}

function undoMove() {
  if (gameStateHistory.length === 0) return;
  const lastState = gameStateHistory.pop();
  community = JSON.parse(lastState.community); stage = lastState.stage;
  currentRoundMax = lastState.currentRoundMax; isRevealed = lastState.isRevealed;
  showBalanceUI = lastState.showBalanceUI; taxRate = lastState.taxRate || 10;
  gameFinished = lastState.gameFinished || false;
  seats = JSON.parse(lastState.seats);
  updateBetDisplay(); renderAll();
}

function showModal(title, bodyHtml, action, showIcons = false) {
  document.getElementById('modalTitle').innerText = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('balToggleBtn').style.display = showIcons ? 'block' : 'none';
  document.getElementById('taxToggleBtn').style.display = showIcons ? 'block' : 'none';
  document.getElementById('customModal').style.display = 'flex';
  activeModalAction = action;
}

function closeModal() {
  let val = document.getElementById('modalInput')?.value;
  document.getElementById('customModal').style.display = 'none';
  if (activeModalAction) activeModalAction(val);
}

function toggleBalanceUI() { saveState(); showBalanceUI = !showBalanceUI; renderAll(); }

function setTaxRate() {
  let currentVal = taxRate;
  document.getElementById('customModal').style.display = 'none';
  setTimeout(() => {
    showModal("Պահումի %", `<input type="number" id="modalInput" class="modal-input" value="${currentVal}">`, (val) => {
        if (val !== undefined && !isNaN(val)) { saveState(); taxRate = parseInt(val); }
    }, false);
  }, 100);
}

function setBet() {
  showModal("Սահմանել Մեկնարկային", `<input type="number" id="modalInput" class="modal-input" value="${baseBet}">`, (b) => {
    if (b && !isNaN(b)) { saveState(); baseBet = parseInt(b); updateBetDisplay(); }
  }, true);
}

function updateTeamBalance(groupId, newBalance) {
  if (groupId === 0) return;
  seats.forEach(s => { if(s.groupId === groupId) s.balance = newBalance; });
}

function applyStep(seatIdx, amount) {
  saveState();
  let s = seats[seatIdx];
  let diff = amount - s.currentStepBet;
  s.balance -= diff;
  if (s.groupId > 0) updateTeamBalance(s.groupId, s.balance);
  currentRoundMax = Math.max(currentRoundMax, amount);
  s.currentStepBet = amount;
  s.showMiniTable = false;
  const slot = document.getElementById("slot" + seatIdx);
  slot.classList.remove("push-effect");
  void slot.offsetWidth;
  slot.classList.add("push-effect");
  updateBetDisplay(); renderAll();
}

function renderSeat(i) {
  let s = seats[i], slot = document.getElementById("slot" + i);
  if(!s.name) return;
  let hasWinner = slot.classList.contains("winner-glow");
  let hasTurn = slot.classList.contains("active-turn");
  let hasAnim = slot.classList.contains("push-effect");
  slot.className = "seat-slot active" + (s.folded ? " folded" : "") + (hasWinner ? " winner-glow" : "") + (hasTurn ? " active-turn" : "") + (hasAnim ? " push-effect" : "");
  let v1 = baseBet, v2 = baseBet*2, v3 = baseBet*3;
  let score = calculateScore(s.cards);
  let balColor = s.balance < 0 ? 'var(--red)' : 'var(--gold)';

  slot.innerHTML = `
    <div class="name-box" style="border-top: 3px solid ${groupColors[s.groupId]}" onclick="openBalanceMenu(event, ${i})">
      <span class="name-tag ${hasWinner ? 'winner-active-name' : ''}">${s.name}</span>
      <span class="score-tag" style="display:${isRevealed ? 'block' : 'none'}">${score}</span>
    </div>
    <div class="cards-container">${s.cards.length ? cardHTML(s.cards[0], s.open) + cardHTML(s.cards[1], s.open) : ''}</div>
    ${s.folded ? `<div class="fold-tag">-${s.penalty}</div>` : `
      <div class="fold-actions">
        <button class="btn-fold" onclick="foldPlayer(event, ${i})">ՔՑԵԼ</button>
        <button class="btn-plus ${s.currentStepBet >= currentRoundMax && currentRoundMax > 0 ? 'pushed' : ''}" onclick="handlePlus(event, ${i})">+</button>
      </div>`}
    <div class="balance-tag" style="display:${showBalanceUI ? 'block' : 'none'}; color:${balColor}">${s.balance}</div>
    ${s.showMiniTable ? `
      <div class="mini-stake-overlay" onclick="event.stopPropagation()">
        <button class="mini-opt" ${v1 < currentRoundMax ? 'disabled' : ''} onclick="applyStep(${i}, ${v1})">${v1}</button>
        <button class="mini-opt" ${v2 < currentRoundMax ? 'disabled' : ''} onclick="applyStep(${i}, ${v2})">${v2}</button>
        <button class="mini-opt" ${v3 < currentRoundMax ? 'disabled' : ''} onclick="applyStep(${i}, ${v3})">${v3}</button>
      </div>` : ''}
  `;
}

function nextCommunity() {
  if (!isRevealed || stage >= 3 || gameFinished) return;
  saveState();
  seats.forEach(s => { 
    if(s.name && !s.folded) { 
        if (s.currentStepBet === 0) { 
          s.balance -= baseBet; 
          if(s.groupId > 0) updateTeamBalance(s.groupId, s.balance); 
          s.totalCommitted += baseBet; 
        } else { 
          s.totalCommitted += s.currentStepBet; 
          s.currentStepBet = 0; 
        }
    } 
  });
  currentRoundMax = 0; updateBetDisplay();
  if (stage === 0) { community = [deck.pop(), deck.pop(), deck.pop()]; stage = 1; }
  else if (stage < 3) { community.push(deck.pop()); stage++; }
  renderAll();
  if (community.length === 5) markWinner();
}

function revealAll() { 
  if (gameFinished) return;
  saveState(); 
  isRevealed = true; 
  seats.forEach((s, i) => { if(s.name) s.open = true; }); 
  renderAll(); 
}

function foldPlayer(event, i) { 
  event.stopPropagation(); 
  saveState();
  let s = seats[i];
  
  if (s.currentStepBet > 0) {
    s.balance += s.currentStepBet;
    if (s.groupId > 0) updateTeamBalance(s.groupId, s.balance);
  }

  s.penalty = s.totalCommitted;
  s.folded = true;
  s.currentStepBet = 0;
  
  document.getElementById("slot" + i).classList.remove("active-turn");
  renderSeat(i); 
  checkAutoWinner(); 
}

function checkAutoWinner() {
  let activeSides = new Set();
  seats.forEach((s, i) => { if (s.name && !s.folded) activeSides.add(s.groupId === 0 ? `p_${i}` : `g_${s.groupId}`); });
  if (activeSides.size === 1) markWinner();
}

function markWinner() {
  if (gameFinished) return;
  let active = []; 
  let totalPot = 0;

  seats.forEach((s, i) => { 
    if(s.name) totalPot += s.penalty || s.totalCommitted + s.currentStepBet;
    if(s.name && !s.folded) active.push({s, i, score: calculateScore(s.cards)}); 
  });

  if (active.length > 0) {
    gameFinished = true; isRevealed = true;
    seats.forEach(s => { if(s.name) s.open = true; });
    
    active.sort((a, b) => b.score - a.score);
    let winners = active.filter(x => x.score === active[0].score);

    // Թիմային շահումի հաշվարկ
    let winningGroupIds = new Set(winners.map(w => w.s.groupId));
    let teamContribution = 0;

    seats.forEach(s => {
      if (s.name && winningGroupIds.has(s.groupId)) {
        if (s.groupId > 0 || winners.some(w => w.i === seats.indexOf(s))) {
          teamContribution += s.penalty || s.totalCommitted + s.currentStepBet;
        }
      }
    });

    let netGain = totalPot - teamContribution;
    let winAmount = teamContribution + Math.floor(netGain * (1 - taxRate/100));

    seats.forEach((s, i) => {
        let isWinner = winners.some(w => w.i === i);
        if (s.name && !isWinner) { 
            if(!s.folded) s.penalty = s.totalCommitted + s.currentStepBet;
            s.folded = true; 
        }
        if (isWinner) document.getElementById("slot" + i).classList.add("winner-glow");
    });

    let finalPerWinner = Math.floor(winAmount / winners.length);
    winners.forEach(w => { 
      w.s.balance += finalPerWinner; 
      if (w.s.groupId > 0) updateTeamBalance(w.s.groupId, w.s.balance); 
    });

    renderAll();
  }
}

function setupSlots() {
  const t = document.getElementById("mainTable");
  for(let i=0; i<9; i++){
    let angle = (2 * Math.PI / 9) * i + Math.PI/2;
    let r = (i === 2 || i === 7 || i === 0) ? 40 : 44;
    let x = 50 + r * Math.cos(angle), y = 50 + ((i === 2 || i === 7) ? 60 : 46) * Math.sin(angle);
    seats.push({name: null, cards: [], open: false, folded: false, penalty: 0, currentStepBet: 0, totalCommitted: 0, groupId: 0, showMiniTable: false, clicks: 0, lastClick: 0, balance: 0});
    let slot = document.createElement("div");
    slot.className = "seat-slot"; slot.id = "slot" + i;
    slot.style.left = x + "%"; slot.style.top = y + "%";
    slot.onclick = (e) => handleSlotInteraction(e, i);
    slot.innerHTML = `<button style="margin-top:40px; background:none; border:none; color:#444; font-size:30px; cursor:pointer">+</button>`;
    t.appendChild(slot);
  }
}

function handleSlotInteraction(e, i) {
  e.stopPropagation();
  if (!seats[i].name) { showModal("Անունը", `<input type="text" id="modalInput" class="modal-input">`, (n) => { if (n) { seats[i].name = n; renderSeat(i); } }); return; }
  let now = Date.now();
  if (now - seats[i].lastClick < 1000) seats[i].clicks++; else seats[i].clicks = 1;
  seats[i].lastClick = now;
  if (seats[i].clicks >= 5) { saveState(); removePlayer(i); } else { if(!seats[i].folded && !gameFinished) setTurn(i); }
}

function setTurn(index) {
  seats.forEach((_, i) => document.getElementById("slot" + i).classList.remove("active-turn"));
  if (seats[index].name && !seats[index].folded) document.getElementById("slot" + index).classList.add("active-turn");
  renderAll();
}

function handlePlus(event, i) { 
  if (gameFinished) return;
  event.stopPropagation(); closeAllMiniOverlays(); seats[i].showMiniTable = true; renderSeat(i); 
}

function closeAllMiniOverlays() { seats.forEach((s, i) => { if(s.showMiniTable) { s.showMiniTable = false; renderSeat(i); } }); }

function renderAll() { 
  seats.forEach((_, i) => renderSeat(i)); 
  document.getElementById("dealerCards").innerHTML = community.map(c => cardHTML(c, true)).join('');
  let nextBtn = document.getElementById("nextBtn");
  if (!isRevealed || stage >= 3 || gameFinished) { nextBtn.style.opacity = "0.4"; nextBtn.style.pointerEvents = "none"; }
  else { nextBtn.style.opacity = "1"; nextBtn.style.pointerEvents = "auto"; }
}

function cardHTML(c, open) { return `<div class="card ${open ? 'open' : ''}"><div class="back"></div><div class="face">${c.v}</div></div>`; }
function updateBetDisplay() { document.getElementById("betDisplay").innerText = "Ընթացիկ ՝ " + currentRoundMax; }

function openBalanceMenu(event, i) {
  event.stopPropagation();
  showModal(`${seats[i].name}-ի Բալանսը`, `<input type="number" id="modalInput" class="modal-input" value="${seats[i].balance}">`, (val) => {
    if (val !== undefined && !isNaN(val)) { saveState(); let b = parseInt(val); seats[i].balance = b; if (seats[i].groupId > 0) updateTeamBalance(seats[i].groupId, b); renderAll(); }
  });
}

function calculateScore(hand) {
  if (!hand || hand.length < 2) return 0;
  let all = [...hand, ...community], counts = {};
  all.forEach(c => counts[c.rank] = (counts[c.rank] || 0) + 1);
  let total = 0;
  for (let r in counts) {
    let rank = parseInt(r), n = counts[r];
    if (rank === 1) total += n; else if (n > 1) total += Math.pow(rank, n); else total += rank;
  }
  return total;
}

function startNewRound() {
  saveState(); community = []; stage = 0; isRevealed = false; gameFinished = false; currentRoundMax = 0; updateBetDisplay();
  deck = []; values.forEach((v, i) => { for(let k=0; k<3; k++) deck.push({v, rank: i+1}); });
  deck.sort(() => Math.random() - 0.5); gameCount++;
  seats.forEach((s, i) => {
    document.getElementById("slot"+i).classList.remove("winner-glow", "active-turn", "folded", "push-effect");
    if(s.name) { 
        s.open = false; s.folded = false; s.penalty = 0; s.currentStepBet = 0; 
        s.cards = [deck.pop(), deck.pop()]; 
        
        s.balance -= baseBet;
        s.totalCommitted = baseBet;
        if(s.groupId > 0) updateTeamBalance(s.groupId, s.balance);
    } 
  });
  renderAll();
}

function removePlayer(i) {
  seats[i] = {name: null, cards: [], open: false, folded: false, penalty: 0, currentStepBet: 0, totalCommitted: 0, groupId: 0, showMiniTable: false, clicks: 0, lastClick: 0, balance: 0};
  let slot = document.getElementById("slot"+i);
  slot.className = "seat-slot"; slot.innerHTML = `<button style="margin-top:40px; background:none; border:none; color:#444; font-size:30px; cursor:pointer">+</button>`;
}

function openGroupPicker(seatIdx) {
  let pickerHtml = `<div class="group-selector">`;
  groupColors.forEach((color, gId) => { pickerHtml += `<div class="g-btn" style="background:${color}" onclick="setPlayerGroup(${seatIdx}, ${gId})"></div>`; });
  pickerHtml += `</div>`;
  showModal("Ընտրիր Խումբը", pickerHtml, null);
}

function setPlayerGroup(seatIdx, groupId) {
  saveState();
  let player = seats[seatIdx];
  player.groupId = groupId;
  if (groupId > 0) {
      let mates = seats.filter(s => s.groupId === groupId && s.name);
      if (mates.length > 0) {
          let totalTeamBalance = mates.reduce((sum, m) => sum + m.balance, 0);
          updateTeamBalance(groupId, totalTeamBalance);
      }
  }
  document.getElementById('customModal').style.display = 'none';
  showPoints(); renderAll();
}

function showPoints() {
  let totalTablePenalty = 0; let activeSides = new Set();
  seats.forEach(s => { if(s.name && !s.folded) activeSides.add(s.groupId === 0 ? `p_${s.name}` : `g_${s.groupId}`); });
  let activeSidesCount = activeSides.size;
  let grouped = {};
  seats.forEach((s, i) => {
    if (!s.name) return;
    if (!grouped[s.groupId]) grouped[s.groupId] = [];
    let isIgnored = s.groupId > 0 && activeSides.has(`g_${s.groupId}`) && s.folded;
    let actualP = isIgnored ? 0 : (s.penalty || 0);
    totalTablePenalty += actualP;
    grouped[s.groupId].push({...s, idx: i, isIgnored, actualP});
  });
  let rowsHtml = "";
  Object.keys(grouped).forEach(gId => {
    let groupSum = 0, playersHtml = "";
    grouped[gId].forEach(p => {
      groupSum += p.actualP;
      let isWinner = (activeSidesCount === 1 && !p.folded);
      let nameHtml = isWinner ? `<span class="winner-active-name">${p.name}</span>` : `<span>${p.name}</span>`;
      let scoreHtml = isWinner ? `<span class="victory-label">ՀԱՂԹԱՆԱԿ</span>` : `<span style="font-weight:bold; color:${p.isIgnored ? '#555' : 'var(--red)'}">${p.penalty > 0 ? (p.isIgnored ? 'ԹԻՄ' : '-' + p.penalty) : '0'}</span>`;
      playersHtml += `<div class="score-row group-${p.groupId}"><div style="display:flex; align-items:center;"><div class="group-dot" style="background:${groupColors[p.groupId]}" onclick="openGroupPicker(${p.idx})"></div>${nameHtml}</div>${scoreHtml}</div>`;
    });
    if (gId == 0) rowsHtml += playersHtml;
    else rowsHtml += `<div class="group-block"><div class="group-players">${playersHtml}</div><div class="group-total-val" style="color:#fff">${groupSum}</div></div>`;
  });
  showModal("Միավորներ", `<div>${rowsHtml || 'Դատարկ'}<div class="total-score">ԸՆԴՀԱՆՈՒՐ: ${totalTablePenalty}</div></div>`, null);
}
setupSlots();
</script>
</body>
</html>
